# bench_config.yaml
environments:
  - image: krater-debian:latest
    runtime_class: default

  - image: krater-static:latest
    runtime_class: default

  - image: krater-wasm:latest
    runtime_class: wasmtime

  - image: krater-wasm:latest
    runtime_class: wasmedge

  - image: krater-wasm:latest
    runtime_class: wasmer


shared_args:
  sizes: [256, 1024]
  trials: 25
  duration: 30
  warmup: true
  interval: 0.5
  namespace: default
  cpu: "1000m"
  memory: "1024Mi"
  results_subfolder_name: test_bench
